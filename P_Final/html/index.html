<!DOCTYPE html>
    <html lang="en" dir="ltr">
      <head>
        <meta charset="utf-8">
        <title>Seq2 server</title>
      </head>
      <body style="background-color: rgb(197, 246, 255);">
        <h2>Basic services</h2>
        <h3> List of species in the database </h3>
        <form action="echo" method="get">
          Limit entries: <input type="number" id="spec_lim" min="1"><br>
          <input type="submit" id="list_species" value="Request"/>  
        </form>
        <br>
        <h3> Information about the karyotype </h3>
        <form action="echo" method="get">
          Enter species:  <input type="text" id="karyotype_spec"/><br>
          <input type="submit" id="karyotype" value="Request"/>
        </form>
        <br>
        <h3> Chromosome length </h3>
        <form action="echo" method="get">
          Enter species:&nbsp &nbsp &nbsp &nbsp &nbsp &nbsp &nbsp <input type="text" id="len_spec"/><br>
          Select chromosome: &nbsp <input type="text" id="len_chrom"/><br>
          <input type="submit" id="chromosome_len" value="Request"/>   
        </form>
        


      </body>
    </html>
