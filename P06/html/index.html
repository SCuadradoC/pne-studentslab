<!DOCTYPE html>
    <html lang="en" dir="ltr">
      <head>
        <meta charset="utf-8">
        <title>Seq2 server</title>
      </head>
      <body>
        <h1>Access to server</h1>
        <p>__________________________________________</p>
        <p>Is the server alive?</p>
        <a href="[[lnk]]/ping">
          <button>Ping</button>
        </a>
        <br>
        <p>Get a sequence. Select sequence number:</p>
        <form action="echo" method="get">
          <select name="get_sequence">
            [[options_seq]]
          </select>
          <input type="submit" value="GET"/>  
        </form>

        <p>Get a gene. Select gene name:</p>
        <form action="echo" method="get">
          <select name="get_gene">
            [[options_gene]]
          </select>
          <input type="submit" value="Gene"/>   
        </form>

        <form action="operation" method="get">
          Enter sequence: <input type="text" name="sequence">
          <br>
          Radio buttons:
          Info<input type="radio" name="op" value="Info" checked> 
          Complement<input type="radio" name="op" value="Complement"> 
          Reverse<input type="radio" name="op" value="Reverse"> 
          <br>
          <input type="submit" value="Operate"/>
        </form>
        
      </body>
    </html>
